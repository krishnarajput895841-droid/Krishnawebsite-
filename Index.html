<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    text-align:center;
    padding:30px;
}
.card{
    max-width:400px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}
#qrcode{
    margin:20px auto;
    background:#fff;
    width:256px;
    padding:10px;
}
button{
    background:#28a745;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h2>Premium Membership</h2>
<h3>₹199</h3>

<div id="qrcode"></div>

<button onclick="payNow()">Pay via UPI</button>

</div>

<script>
const upi =
"upi://pay?pa=YOUR_UPI_ID&pn=Premium%20Membership&am=199&cu=INR";

new QRCode(document.getElementById("qrcode"),{
    text: upi,
    width:256,
    height:256
});

function payNow(){
    window.location.href = upi;
}
</script>

</body>
</html>
